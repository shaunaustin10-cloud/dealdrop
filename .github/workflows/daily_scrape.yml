name: Daily Foreclosure Scrape

on:
  schedule:
    # 12:00 UTC is 8:00 AM EST (standard) or 7:00 AM EST (daylight savings)
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scrapers/package-lock.json

      - name: Install Scraper Dependencies
        run: |
          cd scrapers
          npm install

      - name: Run Scrapers and Upload
        run: |
          cd scrapers
          node index.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          VITE_APP_ID: "default-app-id"
