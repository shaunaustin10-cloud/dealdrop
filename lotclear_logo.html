<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LotClear Premium Logo Redesign</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff; /* Pure white background */
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .logo-container {
            padding: 60px;
            max-width: 900px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <!-- SVG Logo Start -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 350" width="100%" height="auto">
            <defs>
                <style>
                    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap');
                    .text-lot { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 115px; fill: #0F172A; letter-spacing: -0.04em; }
                    .text-clear { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 115px; fill: #EA580C; letter-spacing: -0.04em; }
                    .text-tagline { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 18px; fill: #64748B; letter-spacing: 0.35em; }
                </style>
            </defs>

            <!-- The "Architectural Corner" Icon -->
            <g transform="translate(60, 60)">
                <path d="M 0 0 h 50 v 180 h -50 z" fill="#0F172A" />
                <path d="M 50 130 h 120 l -50 50 h -120 z" fill="#EA580C" />
                <path d="M 170 130 l 30 -30 v 50 l -30 30 z" fill="#C2410C" />
            </g>

            <text x="320" y="215" class="text-lot">Lot</text>
            <text x="505" y="215" class="text-clear">Clear</text>
            <text x="325" y="260" class="text-tagline">LITTER MANAGEMENT &amp; DAILY AUDITS</text>
        </svg>
    </div>

</body>
</html>
